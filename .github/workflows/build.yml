release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    

    permissions:
      contents: write

    steps:
      - name: Checkout (for CHANGELOG / tag info)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          pattern: "miktag-*"
          merge-multiple: true

      - name: List release files
        run: ls -lh release-files/

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "miktag ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## What's new in ${{ github.ref_name }}

            ${{ steps.notes.outputs.NOTES }}

            ---

            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `miktag-setup-windows.exe` | Installer with Start Menu shortcut |
            | 🍎 macOS   | `miktag-macos.dmg`         | Drag to Applications |
            | 🐧 Linux   | `miktag-linux.deb`         | `sudo dpkg -i miktag-linux.deb` |

          files: |
            release-files/miktag-setup-windows.exe
            release-files/miktag-macos.dmg
            release-files/miktag-linux.deb

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}